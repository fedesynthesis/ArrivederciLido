<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#10142b">
<title>Arrivederci Lido</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arrivederci Lido">
<link rel="apple-touch-icon" href="./icon-180.png">
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--night-0:#1b2147;--night-1:#10142b;--card:#1f2750;--card-hi:#283364;--line:#34406f;
    --ink:#f1ede2;--muted:#9aa3cf;--amber:#ffb454;--mint:#63d6a8;--moon:#f6ecca;--disp:"Fredoka",sans-serif}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{font-family:"Nunito",system-ui,-apple-system,sans-serif;color:var(--ink);
    background:radial-gradient(120% 80% at 80% -10%,#2a3470 0%,transparent 55%),linear-gradient(180deg,var(--night-0) 0%,var(--night-1) 60%);
    background-attachment:fixed;min-height:100vh;
    padding:max(10px,env(safe-area-inset-top)) 16px calc(96px + env(safe-area-inset-bottom));overflow-x:hidden}
  .wrap{max-width:560px;margin:0 auto}

  .hero{position:sticky;top:max(8px,env(safe-area-inset-top));z-index:10;
    border-radius:22px;border:1px solid var(--line);overflow:hidden;margin-bottom:14px;background:var(--card);
    box-shadow:0 14px 32px -14px rgba(0,0,0,.6)}
  .scene-wrap{position:relative}
  .scene{display:block;width:100%;height:auto}
  .scene-scrim{position:absolute;left:0;right:0;bottom:0;height:58px;z-index:1;pointer-events:none;
    background:linear-gradient(180deg,rgba(8,10,24,0),rgba(8,10,24,.5))}
  .title{margin:0;font-family:var(--disp);font-weight:600;font-size:21px;line-height:1.05;color:var(--ink)}
  .hero-text{position:relative;padding:10px 16px 13px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .htxt{display:flex;flex-direction:column;justify-content:center;gap:2px;flex:1;min-width:0}
  .count{font-family:var(--disp);font-weight:700;font-size:44px;line-height:.8;letter-spacing:-.01em;flex:0 0 auto}
  .count.zero{color:var(--mint)}
  .count-label{font-size:13px;color:var(--muted);font-weight:700}
  .done-msg{display:none;font-family:var(--disp);font-weight:600;font-size:21px;color:var(--mint);line-height:1;flex:1}
  .done .count,.done .htxt{display:none}.done .done-msg{display:block;animation:rise .5s ease both}
  .bar{flex-basis:100%;height:8px;border-radius:99px;background:#161b3a;overflow:hidden;margin-top:9px;border:1px solid var(--line)}
  .bar>i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--amber),var(--mint));transition:width .5s cubic-bezier(.2,.7,.2,1)}

  .apt{margin-top:20px}
  .apt-head{display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:18px;
    background:linear-gradient(180deg,var(--card-hi),var(--card));border:1px solid var(--line);margin-bottom:10px;transition:.3s}
  .apt.complete .apt-head{border-color:var(--mint);background:linear-gradient(180deg,rgba(99,214,168,.18),rgba(99,214,168,.06))}
  .badge{flex:0 0 34px;width:34px;height:34px;border-radius:11px;display:grid;place-items:center;
    font-family:var(--disp);font-weight:600;font-size:18px;color:#10142b;background:var(--amber);transition:.3s}
  .apt.complete .badge{background:var(--mint)}
  .apt-name{font-family:var(--disp);font-weight:600;font-size:20px;margin:0;flex:1}
  .apt-tally{font-size:12px;font-weight:800;color:var(--muted);background:#161b3a;border:1px solid var(--line);padding:4px 10px;border-radius:99px;transition:.3s}
  .apt.complete .apt-tally{color:#08160f;background:var(--mint);border-color:var(--mint)}

  .list{display:flex;flex-direction:column;gap:8px}
  .item{display:flex;align-items:flex-start;gap:13px;background:var(--card);border:1px solid var(--line);
    border-radius:16px;padding:13px 14px;cursor:pointer;transition:background .18s,border-color .18s,transform .08s;user-select:none}
  .item:hover{background:var(--card-hi)}.item:active{transform:scale(.995)}
  .item:focus-visible{outline:3px solid var(--amber);outline-offset:2px}
  .box{flex:0 0 26px;width:26px;height:26px;border-radius:9px;border:2px solid var(--amber);background:transparent;display:grid;place-items:center;transition:.22s;margin-top:1px}
  .box svg{width:15px;height:15px}
  .box .tick{stroke:#08160f;stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round;fill:none;stroke-dasharray:20;stroke-dashoffset:20;transition:stroke-dashoffset .25s ease}
  .body{flex:1;min-width:0}
  .row1{display:flex;align-items:center;gap:8px}
  .label{flex:1;font-size:15.5px;font-weight:700;line-height:1.28;transition:.2s}
  .hint{font-size:12.5px;color:var(--muted);line-height:1.4;margin-top:3px}
  .thumbs{display:flex;gap:7px;margin-top:9px}
  .thumb{width:60px;height:60px;border-radius:11px;object-fit:cover;border:1px solid var(--line);cursor:zoom-in;transition:.15s}
  .thumb:hover{border-color:var(--amber)}
  .state{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--amber);transition:.2s;white-space:nowrap}
  .item.done{background:rgba(99,214,168,.07);border-color:rgba(99,214,168,.35)}
  .item.done .box{background:var(--mint);border-color:var(--mint)}
  .item.done .box .tick{stroke-dashoffset:0}
  .item.done .label{color:var(--muted);text-decoration:line-through;text-decoration-color:rgba(154,163,207,.5)}
  .item.done .state{color:var(--mint)}

  .footbar{position:fixed;left:0;right:0;bottom:0;z-index:20;padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,rgba(16,20,43,0),rgba(16,20,43,.92) 38%);display:flex;justify-content:center}
  .reset{font-family:"Nunito";font-weight:800;font-size:15px;color:var(--ink);background:var(--card-hi);
    border:1px solid var(--line);padding:13px 22px;border-radius:99px;cursor:pointer;transition:.18s;display:inline-flex;align-items:center;gap:8px}
  .reset:hover{background:#324078}.reset:focus-visible{outline:3px solid var(--amber);outline-offset:2px}
  .note{font-size:12px;color:var(--muted);text-align:center;margin:22px 8px 0;line-height:1.5}
  .lb{position:fixed;inset:0;z-index:50;background:rgba(8,10,24,.92);display:none;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
  .lb.on{display:flex}
  .lb img{max-width:100%;max-height:86vh;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .lb-x{position:absolute;top:calc(14px + env(safe-area-inset-top));right:18px;font-size:30px;color:#fff;background:none;border:none;cursor:pointer;line-height:1}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
  .pop{animation:pop .3s ease}
</style>
</head>

  <header class="hero" id="hero">
    <div class="scene-wrap">
      <svg class="scene" id="scene" viewBox="0 -42 600 192" preserveAspectRatio="xMidYMid meet">

          </radialGradient>
        </defs>
        <rect x="0" y="-46" width="600" height="244" fill="url(#skyGrad)"/>
        <g id="stars" opacity="0"></g>
        <g id="clouds" fill="#ffffff">
          <g opacity="0.9"><ellipse cx="0" cy="24" rx="15" ry="8"/><ellipse cx="13" cy="20" rx="13" ry="10"/><ellipse cx="27" cy="24" rx="15" ry="8"/>
            <animateTransform attributeName="transform" type="translate" from="-150 0" to="760 0" dur="36s" repeatCount="indefinite"/></g>
          <g opacity="0.7"><ellipse cx="0" cy="40" rx="12" ry="6"/><ellipse cx="10" cy="36" rx="11" ry="8"/><ellipse cx="21" cy="40" rx="12" ry="6"/>
            <animateTransform attributeName="transform" type="translate" from="-320 0" to="760 0" dur="55s" repeatCount="indefinite"/></g>
        </g>
        <circle id="moonSh" cx="142" cy="41" r="18" fill="#5fb8e6" opacity="0"/>

        <circle id="sunGlowC" cx="438" cy="34" r="56" fill="url(#sunGlow)"/>
        <circle id="sun" cx="438" cy="34" r="24" fill="#ffe07a"/>
        <g id="gulls" fill="none" stroke="#3a4a63" stroke-width="2" stroke-linecap="round">
          <g><path d="M0 0 Q5 -6 10 0 Q15 -6 20 0"/><animateTransform attributeName="transform" type="translate" from="-40 32" to="700 26" dur="18s" repeatCount="indefinite"/></g>
          <g><path d="M0 0 Q4 -5 8 0 Q12 -5 16 0"/><animateTransform attributeName="transform" type="translate" from="-160 50" to="700 42" dur="25s" repeatCount="indefinite"/></g>
        </g>
        <rect id="sea" x="0" y="96" width="600" height="36" fill="#2f9fc4"/>
        <g id="boat">
          <path id="sail" d="M0,-19 L0,0 L14,0 Z" fill="#f5f7ff"/><path id="sail2" d="M-1,-17 L-12,0 L-1,0 Z" fill="#dde6f6"/>
          <path id="hull" d="M-14,0 L17,0 L11,7 L-9,7 Z" fill="#33405e"/>
          <animateTransform attributeName="transform" type="translate" from="-60 104" to="690 104" dur="44s" repeatCount="indefinite"/>
        </g>
        <ellipse id="glint" cx="438" cy="112" rx="22" ry="6" fill="#ffe07a" opacity="0.5"/>
        <rect id="sand" x="0" y="132" width="600" height="18" fill="#ead8a6"/>
        <g id="umbrellas"></g>
        <g id="palm" fill="#15403a">
          <path id="trunk" d="M60,150 Q72,118 94,90" stroke="#15403a" stroke-width="8" stroke-linecap="round" fill="none"/>
          <g id="fronds">
            <path d="M94,88 Q50,66 24,78 Q54,78 96,94 Z"/><path d="M94,88 Q86,50 96,36 Q106,58 100,92 Z"/><path d="M94,88 Q146,68 174,82 Q140,76 98,94 Z"/>
            <path d="M94,90 Q56,90 32,106 Q62,92 98,96 Z"/><path d="M94,90 Q138,92 164,110 Q130,94 98,96 Z"/><path d="M96,92 Q132,110 148,134 Q118,108 98,98 Z"/>
            <circle cx="90" cy="96" r="3.2"/><circle cx="100" cy="98" r="3.2"/>
            <animateTransform attributeName="transform" type="rotate" values="-1.8 94 90;1.8 94 90;-1.8 94 90" dur="5.5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
          </g>
        </g>
        <g id="fx"></g>
      </svg>
    </div>
    <div class="hero-text">
      <span class="count" id="count">0</span>
      <div class="htxt">
        <h1 class="title">Arrivederci, Lido</h1>
        <span class="count-label">ancora da chiudere</span>
      </div>
      <div class="done-msg">Tutto chiuso. Buon viaggio &#10022;</div>
      <div class="bar"><i id="barFill"></i></div>
    </div>
  </header>

  <main id="lists"></main>
  <p class="note">Tocca una miniatura per ingrandirla. Le spunte restano salvate;
  il pulsante in basso azzera tutto per il prossimo weekend.</p>
</div>

  <button class="reset" id="reset" type="button">&#8635; Ricomincia per il prossimo weekend</button>
</div>

let total=0; APTS.forEach(a=>total+=a.items.length);

const HAS_WS=(typeof window!=="undefined"&&window.storage&&typeof window.storage.get==="function");
async function load(){try{if(HAS_WS){const r=await window.storage.get(KEY);if(r&&r.value)state=JSON.parse(r.value);}else{const v=localStorage.getItem(KEY);if(v)state=JSON.parse(v);}}catch(e){state={}}}
async function save(){try{if(HAS_WS){await window.storage.set(KEY,JSON.stringify(state));}else{localStorage.setItem(KEY,JSON.stringify(state));}}catch(e){}}

const lists=document.getElementById("lists");
APTS.forEach((apt,ai)=>{
  const sec=document.createElement("section"); sec.className="apt";
  sec.innerHTML=`<div class="apt-head"><span class="badge">${ai+1}</span>
    <h2 class="apt-name">${apt.name}</h2><span class="apt-tally">0/${apt.items.length}</span></div><div class="list"></div>`;
  const list=sec.querySelector(".list");
  apt.items.forEach((it,ii)=>{
    const id=ai+"-"+ii;
    const row=document.createElement("div");
    row.className="item"; row.tabIndex=0; row.dataset.id=id;
    row.setAttribute("role","checkbox"); row.setAttribute("aria-checked","false");
    let thumbs="";
    [it.img,it.img2].filter(Boolean).forEach(k=>{if(IMG[k])thumbs+=`<img class="thumb" src="${IMG[k]}" data-full="${k}" alt="">`;});
    row.innerHTML=`<span class="box"><svg viewBox="0 0 16 16"><path class="tick" d="M3 8.5 L6.5 12 L13 4"/></svg></span>
      <div class="body"><div class="row1"><span class="label">${it.t}</span><span class="state">aperto</span></div>
      ${it.hint?`<div class="hint">${it.hint}</div>`:""}${thumbs?`<div class="thumbs">${thumbs}</div>`:""}</div>`;
    row.addEventListener("click",e=>{if(e.target.classList.contains("thumb"))return;toggle(id,row);});
    row.addEventListener("keydown",e=>{if(e.key===" "||e.key==="Enter"){e.preventDefault();toggle(id,row);}});
    list.appendChild(row);
  });
  lists.appendChild(sec);
});

const lb=document.getElementById("lb"),lbimg=document.getElementById("lbimg");
document.querySelectorAll(".thumb").forEach(t=>t.addEventListener("click",e=>{e.stopPropagation();lbimg.src=IMG[t.dataset.full];lb.classList.add("on");}));
function closeLb(){lb.classList.remove("on");lbimg.src="";}
lb.addEventListener("click",closeLb);document.getElementById("lbx").addEventListener("click",closeLb);
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeLb();});

function toggle(id,row){
  state[id]=!state[id];const on=state[id];
  row.classList.toggle("done",on);row.setAttribute("aria-checked",on?"true":"false");
  row.querySelector(".state").textContent=on?"chiuso":"aperto";
  if(on){const b=row.querySelector(".box");b.classList.remove("pop");void b.offsetWidth;b.classList.add("pop");onTaskDone();}else{onTaskUndo();}
  save();render();
}

const $=id=>document.getElementById(id);
const SVGNS="http://www.w3.org/2000/svg";
const sun=$("sun"),sunGlow=$("sunGlowC"),glint=$("glint"),moon=$("moon"),moonSh=$("moonSh"),
      sky0=$("sky0"),sky1=$("sky1"),sea=$("sea"),sand=$("sand"),palm=$("palm"),trunk=$("trunk"),starsG=$("stars"),
      clouds=$("clouds"),gulls=$("gulls"),hull=$("hull"),sail=$("sail"),sail2=$("sail2"),scene=$("scene"),fx=$("fx");
(function(){let s="";for(let i=0;i<24;i++){const x=(8+Math.random()*584).toFixed(0),y=(-38+Math.random()*124).toFixed(0),r=(0.7+Math.random()*1.4).toFixed(1);s+=`<circle cx="${x}" cy="${y}" r="${r}" fill="#fff"/>`;}starsG.innerHTML=s;})();
const REDUCE=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const SKY_TOP=["#5fb8e6","#ef9a5a","#10142b"],SKY_HOR=["#cfeaf5","#ffd49a","#1b2147"],SEA=["#2f9fc4","#b07d7a","#141a38"],
      SAND=["#ead8a6","#caa07a","#262b46"],PALM=["#15403a","#43303a","#0b1024"],SUN=["#ffe07a","#ff8a3d","#ff5e57"],
      HULL=["#33405e","#33405e","#0b1428"],SAIL=["#f5f7ff","#f6e6cf","#b9c4e0"],SAIL2=["#dde6f6","#e6cfb6","#9aa6c6"];
function hx(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function rh(c){return "#"+c.map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,"0")).join("");}
function mix(a,b,t){a=hx(a);b=hx(b);return rh([0,1,2].map(i=>a[i]+(b[i]-a[i])*t));}
function k3(a,p){return p<0.5?mix(a[0],a[1],p/0.5):mix(a[1],a[2],(p-0.5)/0.5);}
function clamp01(x){return Math.max(0,Math.min(1,x));}
function ramp(p,a,b){return clamp01((p-a)/(b-a));}
function updateScene(p){
  sky0.setAttribute("stop-color",k3(SKY_TOP,p));sky1.setAttribute("stop-color",k3(SKY_HOR,p));
  sea.setAttribute("fill",k3(SEA,p));sand.setAttribute("fill",k3(SAND,p));
  const pc=k3(PALM,p);palm.setAttribute("fill",pc);trunk.setAttribute("stroke",pc);
  const sy=34+88*p,sf=k3(SUN,p),sop=1-ramp(p,.58,.84);
  sun.setAttribute("cy",sy);sun.setAttribute("fill",sf);sun.setAttribute("opacity",sop);
  sunGlow.setAttribute("cy",sy);sunGlow.setAttribute("opacity",sop*0.9);
  glint.setAttribute("fill",sf);glint.setAttribute("opacity",sop*0.45);
  const mop=ramp(p,.5,.85),my=46-10*ramp(p,.5,1);
  moon.setAttribute("opacity",mop);moon.setAttribute("cy",my);
  moonSh.setAttribute("opacity",mop);moonSh.setAttribute("cy",my-5);moonSh.setAttribute("fill",k3(SKY_TOP,p));
  starsG.setAttribute("opacity",ramp(p,.45,1));
  const day=1-ramp(p,.45,.8);
  clouds.setAttribute("opacity",day);gulls.setAttribute("opacity",day);
  hull.setAttribute("fill",k3(HULL,p));sail.setAttribute("fill",k3(SAIL,p));sail2.setAttribute("fill",k3(SAIL2,p));
}
/* ---- interaction effects engine ---- */
function E(t,a){const e=document.createElementNS(SVGNS,t);for(const k in a)e.setAttribute(k,a[k]);return e;}
function anim(el,dur,fn,done){const t0=performance.now();(function s(n){let k=Math.min(1,(n-t0)/dur);fn(k);if(k<1)requestAnimationFrame(s);else if(done)done();})(t0);}
function ripple(x,y,col){const c=E("ellipse",{cx:x,cy:y,rx:2,ry:1,fill:"none",stroke:col||"#fff","stroke-width":1.5,opacity:.9});fx.appendChild(c);
  anim(c,650,k=>{c.setAttribute("rx",2+15*k);c.setAttribute("ry",1+5*k);c.setAttribute("opacity",.9*(1-k));},()=>c.remove());}
function splash(x){ripple(x,100,"#e6f6ff");for(let i=0;i<4;i++){const d=E("circle",{cx:x,cy:100,r:1.4,fill:"#eaf6ff"});fx.appendChild(d);
  const a=-Math.PI/2+(i-1.5)*0.5,sp=9+Math.random()*8;anim(d,600,k=>{d.setAttribute("cx",x+Math.cos(a)*sp*k);d.setAttribute("cy",100+Math.sin(a)*sp*k+20*k*k);d.setAttribute("opacity",1-k);},()=>d.remove());}}
function fishJump(x){const x1=x+(Math.random()<.5?-1:1)*(20+Math.random()*14),amp=26+Math.random()*8;splash(x);
  const g=E("g",{});g.appendChild(E("path",{d:"M0,0 Q6,-4 12,0 Q6,4 0,0 Z",fill:"#9cc0d2"}));g.appendChild(E("path",{d:"M12,0 l5,-3 v6 z",fill:"#7ea7bb"}));fx.appendChild(g);
  anim(g,900,k=>{const xx=x+(x1-x)*k,yy=100-amp*4*k*(1-k),rot=(x1>x?1:-1)*(k*200-100);g.setAttribute("transform",`translate(${xx},${yy}) rotate(${rot})`);g.setAttribute("opacity",k<.1?k*10:(k>.9?(1-k)*10:1));},()=>{splash(x1);g.remove();});}
function coconut(){const c=E("circle",{cx:96,cy:96,r:3.2,fill:"#5a3a22"});fx.appendChild(c);
  anim(c,750,k=>{c.setAttribute("cy",96+54*k*k);},()=>anim(c,480,k=>{c.setAttribute("cx",96+20*k);c.setAttribute("cy",150-9*Math.sin(Math.PI*k));c.setAttribute("opacity",1-k*.7);},()=>c.remove()));}
function sparkle(x,y,col){for(let i=0;i<6;i++){const a=Math.PI*2*i/6,l=E("line",{x1:x,y1:y,x2:x,y2:y,stroke:col||"#fff5c8","stroke-width":2,"stroke-linecap":"round"});fx.appendChild(l);
  anim(l,520,k=>{const r1=4+10*k,r2=10+16*k;l.setAttribute("x1",x+Math.cos(a)*r1);l.setAttribute("y1",y+Math.sin(a)*r1);l.setAttribute("x2",x+Math.cos(a)*r2);l.setAttribute("y2",y+Math.sin(a)*r2);l.setAttribute("opacity",1-k);},()=>l.remove());}}
function ball(){const cols=["#ff5e57","#ffd23f","#4cc3ff","#fff"],g=E("g",{});g.appendChild(E("circle",{cx:0,cy:0,r:7,fill:"#fff"}));
  for(let i=0;i<3;i++)g.appendChild(E("path",{d:`M0,0 L${7*Math.cos(i*2.1)},${7*Math.sin(i*2.1)} A7,7 0 0,1 ${7*Math.cos(i*2.1+2.1)},${7*Math.sin(i*2.1+2.1)} Z`,fill:cols[i],opacity:.85}));
  fx.appendChild(g);anim(g,2200,k=>{const x=-12+340*k,y=146-Math.abs(Math.sin(k*Math.PI*3))*22;g.setAttribute("transform",`translate(${x},${y}) rotate(${k*720})`);g.setAttribute("opacity",k>.92?(1-k)/.08:1);},()=>g.remove());}
function gull(y,dur){const g=E("g",{fill:"none",stroke:"#2b3850","stroke-width":2.2,"stroke-linecap":"round"});g.appendChild(E("path",{d:"M0 0 Q6 -7 12 0 Q18 -7 24 0"}));fx.appendChild(g);
  const yy=y||(16+Math.random()*40),d=dur||1500,dir=Math.random()<.5?1:-1,x0=dir>0?-30:660,x1=dir>0?660:-30;
  anim(g,d,k=>{g.setAttribute("transform",`translate(${x0+(x1-x0)*k},${yy+Math.sin(k*9)*2}) scale(${dir},1)`);g.setAttribute("opacity",k<.1?k*10:(k>.9?(1-k)*10:1));},()=>g.remove());}
function shootOne(){const x0=300+Math.random()*140,g=E("g",{});g.appendChild(E("line",{x1:0,y1:0,x2:22,y2:9,stroke:"#fff","stroke-width":2,"stroke-linecap":"round"}));fx.appendChild(g);
  const dx=130+Math.random()*70;anim(g,850,k=>{g.setAttribute("transform",`translate(${x0+dx*k},${-12+70*k})`);g.setAttribute("opacity",Math.sin(Math.PI*k));},()=>g.remove());}
function lanterns(){for(let i=0;i<5;i++)setTimeout(()=>{const x=40+Math.random()*520,glow=E("circle",{cx:x,cy:122,r:6,fill:"#ffce6e",opacity:.3}),c=E("circle",{cx:x,cy:122,r:2.6,fill:"#ffd27a"});fx.appendChild(glow);fx.appendChild(c);
  anim(c,3000,k=>{const y=122-92*k,xx=x+Math.sin(k*6+i)*6,o=k<.1?k*10:(1-k);c.setAttribute("cy",y);c.setAttribute("cx",xx);glow.setAttribute("cy",y);glow.setAttribute("cx",xx);c.setAttribute("opacity",o);glow.setAttribute("opacity",o*.35);},()=>{c.remove();glow.remove();});},i*240);}
function moonPulse(){anim(moon,700,k=>{const s=1+.18*Math.sin(Math.PI*k);moon.setAttribute("r",18*s);moonSh.setAttribute("r",18*s);},()=>{moon.setAttribute("r",18);moonSh.setAttribute("r",18);});}
function sunPulse(){anim(sun,420,k=>{sun.setAttribute("r",24*(1+.15*Math.sin(Math.PI*k)));},()=>sun.setAttribute("r",24));}
const UMB_X=[372,470];let umb=[null,null],prevC=[false,false],_fxi=0;
function makeUmbrella(x){const g=E("g",{});g.appendChild(E("line",{x1:x,y1:141,x2:x,y2:121,stroke:"#7a5a3a","stroke-width":2}));
  g.appendChild(E("path",{d:`M${x-16},123 A16,12 0 0,1 ${x+16},123 Z`,fill:"#ff6b5e"}));
  g.appendChild(E("path",{d:`M${x},123 L${x-16},123 A16,12 0 0,1 ${x-1},112 Z`,fill:"#ffd23f",opacity:.92}));
  g.appendChild(E("path",{d:`M${x},123 L${x+16},123 A16,12 0 0,0 ${x+1},112 Z`,fill:"#ffffff",opacity:.85}));return g;}
function setUmbrella(ai,on){const layer=$("umbrellas");
  if(on&&!umb[ai]){umb[ai]=makeUmbrella(UMB_X[ai]);layer.appendChild(umb[ai]);if(_ready&&!REDUCE){const x=UMB_X[ai],g=umb[ai];anim(g,480,k=>{const s=k<.75?k/.75:1+.08*Math.sin((k-.75)/.25*Math.PI);g.setAttribute("transform",`translate(${x},141) scale(${s}) translate(${-x},-141)`);},()=>g.setAttribute("transform",""));}}
  else if(!on&&umb[ai]){umb[ai].remove();umb[ai]=null;}}
function aptCelebrate(ai){if(REDUCE)return;sparkle(UMB_X[ai],128,"#fff2b0");gull(20,1200);gull(34,1400);ball();}
function fullCelebrate(){if(REDUCE)return;for(let i=0;i<3;i++)setTimeout(shootOne,i*340);lanterns();moonPulse();}
function onTaskDone(){if(REDUCE)return;gull();if(+sun.getAttribute("opacity")>0.1)sunPulse();
  const a=[()=>fishJump(120+Math.random()*360),()=>splash(120+Math.random()*360),coconut,()=>sparkle(150+Math.random()*380,138),ball,()=>gull(24+Math.random()*28,1100)];a[_fxi++%a.length]();}
function onTaskUndo(){if(REDUCE)return;splash(120+Math.random()*360);}
scene.addEventListener("click",ev=>{if(REDUCE)return;const r=scene.getBoundingClientRect();const x=(ev.clientX-r.left)/r.width*600,y=(ev.clientY-r.top)/r.height*192-42;
  if(y<96){gull(Math.max(10,Math.min(72,y)),1200);sparkle(x,y,"#ffffff");}else if(y<132){fishJump(Math.max(20,Math.min(580,x)));}else{if(x<150)coconut();else ball();}});

const countEl=$("count"),barFill=$("barFill"),hero=$("hero");
let _wasDone=false,_ready=false;
function render(){
  let done=0;
  APTS.forEach((apt,ai)=>{
    let c=0; apt.items.forEach((_,ii)=>{if(state[ai+"-"+ii])c++;}); done+=c;
    const sec=lists.children[ai];
    sec.querySelector(".apt-tally").textContent=c+"/"+apt.items.length;
    sec.classList.toggle("complete",c===apt.items.length);
  });
  APTS.forEach((apt,ai)=>{const c=apt.items.filter((_,ii)=>state[ai+"-"+ii]).length,comp=c===apt.items.length;if(comp!==prevC[ai]){setUmbrella(ai,comp);if(comp&&_ready)aptCelebrate(ai);prevC[ai]=comp;}});
  const open=total-done,pct=done/total;
  countEl.textContent=open;countEl.classList.toggle("zero",open===0);
  barFill.style.width=(pct*100)+"%";hero.classList.toggle("done",open===0);
  updateScene(pct);
  if(open===0&&_ready&&!_wasDone)fullCelebrate();
  _wasDone=(open===0);
}

document.getElementById("reset").addEventListener("click",()=>{
  if(Object.values(state).some(Boolean)&&!confirm("Azzerare tutte le spunte per il prossimo weekend?"))return;
  state={};
  document.querySelectorAll(".item").forEach(r=>{r.classList.remove("done");r.setAttribute("aria-checked","false");r.querySelector(".state").textContent="aperto";});
  save();render();
});

(async()=>{await load();
  document.querySelectorAll(".item").forEach(r=>{if(state[r.dataset.id]){
    r.classList.add("done");r.setAttribute("aria-checked","true");r.querySelector(".state").textContent="chiuso";}});
  render();_ready=true;
})();
</script>
